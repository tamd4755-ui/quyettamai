<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUYẾT TÂM AI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✦</text></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #131314; color: #e3e3e3; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-layout { display: flex; width: 100vw; height: 100vh; background: #131314; overflow: hidden; }
        .sidebar { width: 280px; background: #1e1e20; color: #e3e3e3; display: flex; flex-direction: column; padding: 16px 12px; border-right: 1px solid #28292a; }
        .sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 6px 16px 6px; }
        .brand-logo { font-size: 1.1rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
        .sidebar-menu { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
        .menu-btn { display: flex; align-items: center; gap: 14px; padding: 10px 14px; border-radius: 24px; color: #ccc; font-size: 0.9rem; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; }
        .menu-btn:hover { background: #2f3032; color: #fff; }
        .menu-btn.active { background: #282a2d; color: #fff; font-weight: 600; }
        .chat-container { flex: 1; display: flex; flex-direction: column; background: #131314; height: 100vh; width: 100%; overflow: hidden; }
        .welcome-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .welcome-title { font-size: 2.3rem; font-weight: 500; background: linear-gradient(90deg, #4285f4 0%, #a855f7 50%, #ec4899 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .messages { flex: 1; padding: 20px 15%; overflow-y: auto; display: none; flex-direction: column; gap: 16px; }
        .messages.active { display: flex; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 80%; font-size: 1rem; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
        .user { background: #282a2d; color: #fff; align-self: flex-end; }
        .ai { background: #1e1e20; color: #e3e3e3; align-self: flex-start; border: 1px solid #28292a; }
        .input-wrapper-center { width: 100%; max-width: 720px; padding: 0 16px 28px 16px; margin: 0 auto; }
        .input-bar { display: flex; align-items: center; background: #1e1e20; border-radius: 30px; padding: 8px 16px; gap: 12px; border: 1px solid #28292a; }
        .input-bar input { flex: 1; padding: 8px 4px; border: none; background: transparent; outline: none; font-size: 1rem; color: #fff; }
        .btn-send { background: #282a2d; color: #aaa; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; }
        .btn-send:hover { background: #1a73e8; color: #fff; }
    </style>
</head>
<body>

<div class="app-layout">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="brand-logo"><span style="color:#4285f4;">✦</span> QUYẾT TÂM AI</div>
        </div>
        <div class="sidebar-menu">
            <button class="menu-btn active" onclick="location.reload()">📝 Cuộc trò chuyện mới</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="welcome-screen" id="welcomeScreen">
            <h1 class="welcome-title">Chào bạn, tiếp theo mình làm gì?</h1>
        </div>

        <div class="messages" id="msgs"></div>

        <div class="input-wrapper-center">
            <div class="input-bar">
                <input type="text" id="inp" placeholder="Hỏi QUYẾT TÂM AI..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn-send" onclick="send()">↑</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Đã tích hợp sẵn Key Groq siêu tốc của bạn
    const GROQ_API_KEY = "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";

    async function send() {
        let inp = document.getElementById('inp');
        let txt = inp.value.trim();
        if (!txt) return;

        document.getElementById('welcomeScreen').style.display = 'none';
        let msgs = document.getElementById('msgs');
        msgs.classList.add('active');

        msgs.innerHTML += `<div class='msg user'>${txt}</div>`;
        
        let loading = document.createElement('div');
        loading.className = 'msg ai';
        loading.innerText = 'QUYẾT TÂM AI đang suy nghĩ...';
        msgs.appendChild(loading);
        msgs.scrollTop = msgs.scrollHeight;

        inp.value = '';

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    messages: [{ role: "user", content: txt }],
                    model: "llama-3.3-70b-versatile"
                })
            });

            const data = await response.json();

            if (data.choices && data.choices[0] && data.choices[0].message) {
                loading.innerText = data.choices[0].message.content;
            } else {
                loading.innerText = "Lỗi phản hồi: " + (data.error?.message || "Không thể lấy dữ liệu.");
            }
        } catch (err) {
            loading.innerText = "Lỗi kết nối: " + err.message;
        }

        msgs.scrollTop = msgs.scrollHeight;
    }
</script>

</body>
</html>
